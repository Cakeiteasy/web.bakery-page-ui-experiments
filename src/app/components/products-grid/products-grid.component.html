<section
  class="products-grid"
  [style.--grid-gap.px]="cardsConfig.grid.gapPx || 18"
  [style.--desktop-columns]="cardsConfig.grid.desktopColumns || 3"
  [style.--tablet-columns]="cardsConfig.grid.tabletColumns || 2"
  [style.--mobile-columns]="cardsConfig.grid.mobileColumns || 1"
>
  <ng-container *ngIf="loading; else loadedState">
    <div class="menu-view skeleton-menu" *ngIf="isMenuMode; else nonMenuSkeletonState">
      <article
        class="skeleton-card skeleton-card-menu"
        *ngFor="let skeleton of menuSkeletonIndexes; trackBy: trackByIndex"
      >
        <div class="skeleton-menu-main">
          <span class="skeleton-line title"></span>
          <span class="skeleton-line subtitle"></span>
          <div class="skeleton-chip-row">
            <span class="skeleton-chip"></span>
            <span class="skeleton-chip"></span>
          </div>
        </div>
        <div class="skeleton-menu-side">
          <span class="skeleton-line price"></span>
          <span class="skeleton-line side"></span>
        </div>
      </article>
    </div>

    <ng-template #nonMenuSkeletonState>
      <div class="list-view skeleton-list" *ngIf="isListMode; else gridSkeletonState">
        <article
          class="skeleton-card skeleton-card-list"
          *ngFor="let skeleton of listSkeletonIndexes; trackBy: trackByIndex"
        >
          <div class="skeleton-media"></div>
          <div class="skeleton-body">
            <span class="skeleton-line title"></span>
            <span class="skeleton-line subtitle"></span>
            <span class="skeleton-line price"></span>
          </div>
        </article>
      </div>

      <ng-template #gridSkeletonState>
        <div class="masonry-grid skeleton-grid" *ngIf="isMasonry; else uniformSkeletonState">
          <article
            class="masonry-item skeleton-card skeleton-card-grid"
            *ngFor="let skeleton of gridSkeletonIndexes; trackBy: trackByIndex"
          >
            <div class="skeleton-media"></div>
            <div class="skeleton-body">
              <span class="skeleton-line title"></span>
              <span class="skeleton-line subtitle"></span>
              <span class="skeleton-line price"></span>
            </div>
          </article>
        </div>

        <ng-template #uniformSkeletonState>
          <div class="uniform-grid skeleton-grid">
            <article
              class="uniform-item skeleton-card skeleton-card-grid"
              *ngFor="let skeleton of gridSkeletonIndexes; trackBy: trackByIndex"
            >
              <div class="skeleton-media"></div>
              <div class="skeleton-body">
                <span class="skeleton-line title"></span>
                <span class="skeleton-line subtitle"></span>
                <span class="skeleton-line price"></span>
              </div>
            </article>
          </div>
        </ng-template>
      </ng-template>
    </ng-template>
  </ng-container>

  <ng-template #loadedState>
    <p class="empty-state" *ngIf="!products.length">
      No products available for this filter selection.
    </p>

    <div class="menu-view" *ngIf="isMenuMode && products.length">
      <app-product-menu-row
        *ngFor="let product of products; trackBy: trackByProductId"
        [product]="product"
        [cardsConfig]="cardsConfig"
        [pieceQuantities]="pieceQuantities"
        (increasePieceQty)="onIncreasePieceQty($event)"
        (decreasePieceQty)="onDecreasePieceQty($event)"
        (viewProduct)="onViewProduct($event)"
      />
    </div>

    <div class="list-view" *ngIf="isListMode && products.length">
      <div class="list-item" *ngFor="let product of products; index as i; trackBy: trackByProductId">
        <app-product-card
          [product]="product"
          [cardsConfig]="cardsConfig"
          [viewMode]="viewMode"
          [quantity]="getPieceQty(product.id)"
          [index]="i"
          (increasePieceQty)="onIncreasePieceQty($event)"
          (decreasePieceQty)="onDecreasePieceQty($event)"
          (viewProduct)="onViewProduct($event)"
        />
      </div>
    </div>

    <div class="masonry-grid" *ngIf="!isMenuMode && !isListMode && isMasonry && products.length">
      <div class="masonry-item" *ngFor="let product of products; index as i; trackBy: trackByProductId">
        <app-product-card
          [product]="product"
          [cardsConfig]="cardsConfig"
          [viewMode]="viewMode"
          [quantity]="getPieceQty(product.id)"
          [index]="i"
          (increasePieceQty)="onIncreasePieceQty($event)"
          (decreasePieceQty)="onDecreasePieceQty($event)"
          (viewProduct)="onViewProduct($event)"
        />
      </div>
    </div>

    <div class="uniform-grid" *ngIf="!isMenuMode && !isListMode && !isMasonry && products.length">
      <div class="uniform-item" *ngFor="let product of products; index as i; trackBy: trackByProductId">
        <app-product-card
          [product]="product"
          [cardsConfig]="cardsConfig"
          [viewMode]="viewMode"
          [quantity]="getPieceQty(product.id)"
          [index]="i"
          (increasePieceQty)="onIncreasePieceQty($event)"
          (decreasePieceQty)="onDecreasePieceQty($event)"
          (viewProduct)="onViewProduct($event)"
        />
      </div>
    </div>
  </ng-template>
</section>
