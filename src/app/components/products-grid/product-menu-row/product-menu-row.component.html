<article class="product-menu-row" [class.no-image]="!product.imageUrl">
  <div class="menu-media" *ngIf="product.imageUrl">
    <img class="menu-image" [src]="product.imageUrl" [alt]="product.name" />
  </div>

  <section class="menu-main">
    <h3 class="menu-title">{{ product.name }}</h3>
    <button type="button" class="details-link" (click)="onViewProduct()">Se detaljer</button>

    <p class="menu-description">{{ descriptionText }}</p>

    <div class="menu-allergens" *ngIf="visibleAllergens.length">
      <span class="allergen-chip" *ngFor="let allergen of visibleAllergens">{{ allergen }}</span>
      <span class="allergen-chip allergen-overflow" *ngIf="hiddenAllergenCount > 0">+{{ hiddenAllergenCount }}</span>
    </div>
  </section>

  <aside class="menu-actions" [class.menu-actions-multi]="hasMultipleSizes">
    <p class="menu-price">
      <span class="price-prefix" *ngIf="showFromLabel">Fra</span>
      <span class="price-value">{{ priceAmountText }}</span>
    </p>

    <p class="menu-details">{{ detailLineText }}</p>

    <div class="menu-size-list" *ngIf="hasMultipleSizes; else singleActionState">
      <div class="menu-size-row" *ngFor="let size of menuSizes; trackBy: trackBySizeId">
        <div class="size-meta">
          <span class="size-label">{{ size.label }}</span>
          <span class="size-price">{{ getSizePriceText(size) }}</span>
        </div>

        <div class="piece-counter size-counter" *ngIf="size.isPiecesLike; else sizeCtaState">
          <button type="button" (click)="onDecreasePieceQty(size.id)" aria-label="Decrease size quantity">-</button>
          <span>{{ getQuantity(size.id) }}</span>
          <button type="button" (click)="onIncreasePieceQty(size.id)" aria-label="Increase size quantity">+</button>
        </div>

        <ng-template #sizeCtaState>
          <button type="button" class="cta-button" (click)="onViewProduct()">{{ ctaText }}</button>
        </ng-template>
      </div>
    </div>

    <ng-template #singleActionState>
      <div class="menu-action-row">
        <div class="piece-counter" *ngIf="showPieceCounter">
          <button type="button" (click)="onDecreasePieceQty(product.id)" aria-label="Decrease quantity">-</button>
          <span>{{ getQuantity(product.id) }}</span>
          <button type="button" (click)="onIncreasePieceQty(product.id)" aria-label="Increase quantity">+</button>
        </div>

        <button type="button" class="cta-button" *ngIf="!showPieceCounter" (click)="onViewProduct()">{{ ctaText }}</button>
      </div>
    </ng-template>
  </aside>
</article>
