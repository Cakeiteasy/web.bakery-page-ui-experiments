<nav
  class="categories-bar"
  [class.sticky-mobile]="categoriesConfig?.stickyMobile"
  [class.preset-chips]="preset === 'chips'"
  [class.preset-segmented]="preset === 'segmented'"
  [class.preset-minimal]="preset === 'minimal'"
  [style.--cat-height.px]="buttonHeightPx"
  [style.--cat-font-size.px]="fontSizePx"
>
  <div class="category-scroll" role="tablist" aria-label="Product categories">
    <button
      type="button"
      class="category-button"
      role="tab"
      *ngFor="let category of categories; trackBy: trackByCategoryId"
      [class.active]="category.id === selectedCategoryId"
      [attr.aria-selected]="category.id === selectedCategoryId"
      (click)="selectCategory(category.id)"
    >
      {{ category.name }}
    </button>
  </div>
</nav>
