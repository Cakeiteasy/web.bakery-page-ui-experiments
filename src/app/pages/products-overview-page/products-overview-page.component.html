<app-categories-bar
  [categories]="productsService.categories()"
  [selectedCategoryId]="productsService.selectedCategoryId()"
  [categoriesConfig]="uiConfigService.activeConfig().chooseCake.categories"
  (categorySelected)="onCategorySelected($event)"
/>

<section class="content-layout">
  <aside class="sidebar-column">
    <app-filter-panel
      [filters]="productsService.filtersResponse()"
      [allergens]="productsService.allergens()"
      [activeFilters]="productsService.activeFilters()"
      (allergenToggled)="onAllergenToggled($event)"
      (productGroupToggled)="onProductGroupToggled($event)"
      (motiveChanged)="onMotiveChanged($event)"
    />

    <div class="view-toggle" role="tablist" aria-label="Products view mode">
      <button
        type="button"
        role="tab"
        [class.active]="activeViewMode === 'grid'"
        [attr.aria-selected]="activeViewMode === 'grid'"
        (click)="onViewModeChanged('grid')"
      >
        Grid
      </button>
      <button
        type="button"
        role="tab"
        [class.active]="activeViewMode === 'list'"
        [attr.aria-selected]="activeViewMode === 'list'"
        (click)="onViewModeChanged('list')"
      >
        List
      </button>
      <button
        type="button"
        role="tab"
        [class.active]="activeViewMode === 'menu'"
        [attr.aria-selected]="activeViewMode === 'menu'"
        (click)="onViewModeChanged('menu')"
      >
        Menu
      </button>
    </div>
  </aside>

  <div class="products-region">
    <p class="status error" *ngIf="productsService.error() as errorMsg">{{ errorMsg }}</p>

    <app-products-grid
      [products]="productsService.visibleProducts()"
      [cardsConfig]="uiConfigService.activeConfig().chooseCake.cards"
      [viewMode]="activeViewMode"
      [loading]="productsService.loading()"
      [pieceQuantities]="productsService.pieceQuantities()"
      (increasePieceQty)="onIncreasePieceQty($event)"
      (decreasePieceQty)="onDecreasePieceQty($event)"
      (viewProduct)="onViewProduct($event)"
    />
  </div>
</section>
