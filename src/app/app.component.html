<ng-container *ngIf="!buildWithAiMode(); else buildWithAiRoute">
  <div class="app-shell">
    <app-preset-switcher
      [activePreset]="uiConfigService.activePresetKey()"
      [activeBakery]="activeBakery.key"
      [bakeries]="bakeryOptions"
      [presets]="presetOptions"
      (bakeryChanged)="onBakeryChanged($event)"
      (presetChanged)="onPresetChanged($event)"
    />

    <div class="header-region">
      <app-shop-header
        [bakeryName]="bakeryName"
        [logoUrl]="logoUrl"
        [websiteUrl]="websiteUrl"
        [headerLinks]="headerLinks"
        [searchQuery]="productsService.searchQuery()"
        [cartItems]="cartItems"
        [cartQuantity]="cartQuantity"
        [cartBadgeText]="cartBadgeText"
        (searchChanged)="onSearchChanged($event)"
      />

      <div
        class="notification-strip"
        *ngIf="notificationText"
        [style.background]="notificationBg"
        [style.color]="notificationTextColor"
      >
        {{ notificationText }}
      </div>
    </div>

    <main class="route-region">
      <router-outlet></router-outlet>
    </main>

    <footer class="app-footer" *ngIf="brandingSettled()">
      <div class="footer-content">
        <p class="footer-copy">© {{ currentYear }} {{ bakeryName }}</p>
        <a *ngIf="websiteUrl" [href]="websiteUrl" target="_blank" rel="noopener noreferrer">{{ websiteLabel }}</a>
        <a *ngIf="bakeryPhone" [href]="'tel:' + bakeryPhoneHref">{{ bakeryPhone }}</a>
        <a *ngIf="bakeryEmail" [href]="'mailto:' + bakeryEmail">{{ bakeryEmail }}</a>
      </div>
    </footer>
  </div>
</ng-container>

<ng-template #buildWithAiRoute>
  <main class="build-with-ai-route-shell">
    <router-outlet></router-outlet>
  </main>
</ng-template>
